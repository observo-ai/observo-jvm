name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Runs unit tests, the TestKit functional suite, and the resolver
      # integration test — the last one really downloads an observo-cli release
      # and verifies its checksum, so it catches drift in the GoReleaser asset
      # contract that lives in the observo-cli repo.
      - name: Build and test
        run: ./gradlew build --stacktrace

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: observo-gradle-plugin/build/reports/tests/test
          retention-days: 7
